
[gcode_macro PRINT_START]
gcode:

  {% set BED = params.BED_TEMP|int %}
  {% set HOTEND_TEMP = 170 %}
  {% set EXTRUDER = params.EXTRUDER_TEMP|int %}

  SET_FAN_SPEED FAN=Bedfans SPEED=0          ;start Bedfans
  SET_FAN_SPEED FAN=Nevermore SPEED=0       ;start Nevermore fans

  G90 ; Absolute mode

 
  M140 S75                    ;Set bed temperature
  M104 S{HOTEND_TEMP}
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={HOTEND_TEMP-20} MAXIMUM={HOTEND_TEMP+15}
    
  _CHOME                      ;Home all axes if not homed
  _CQGL                       ;Quad Gantry Level if not done

  G0 X175 Y175 F10000          ;Move XY
  G28 Z                       ;Home Z axis
  G0 Z10 F3000                ;Move Up
  
  CLEAN_NOZZLE                ;Nozzle cleaning routine

  BED_MESH_CLEAR              ;Clear Bed Mesh
  BED_MESH_CALIBRATE          ;Bed Mesh 30,30
  
  G0 Z10 F3000                ;Lift nozzle
  G0 X340 Y350 F10000         ;Move to purge area

  M190 S{BED}                 ;Set bed temperature and wait
  M109 S{EXTRUDER}            ;Set extruder temperature and wait

	PURGE_TO_BUCKET           ;purge filament scrub and start print
 
[gcode_macro PRINT_END]
gcode:
  G1 E-10 F1800  ;Retract filament
  _MOVE_AWAY  ;Move away from print
  PARK_CENTER_REAR  ;Park central rear
  G0 X175 Y325 F3000  ;Move XY
  G90 ;Absolute mode
  TURN_OFF_HEATERS  ;Turn off heaters
    SET_FAN_SPEED FAN=Bedfans SPEED=0    ;stop Bedfans
  SET_FAN_SPEED FAN=Nevermore SPEED=0        ;stop Nevermore fans

  
 

[gcode_macro _CHOME]
gcode:
  {% if printer["gcode_macro status_homing"] != null %}
    status_homing
  {% endif %}
  {% if printer.toolhead.homed_axes != "xyz" %}
  G28
  {% endif %}
  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}

[gcode_macro _CQGL]
gcode:
  {% if printer.quad_gantry_level.applied == False %}
      {% if "xyz" not in printer.toolhead.homed_axes %}
          G28 ; home if not already homed
      {% endif %}
      {% if printer["gcode_macro status_leveling"] != null %}
        status_leveling
      {% endif %}
      QUAD_GANTRY_LEVEL
   #   G28 Z
  {% endif %}
  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}


[gcode_macro M190]
rename_existing: M190.1
gcode:
  {% if printer["gcode_macro status_heating"] != null %}
    status_heating
  {% endif %}
    M190.1 { rawparams }
  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}




[gcode_macro M109]
rename_existing: M109.1
gcode:
  {% if printer["gcode_macro status_heating"] != null %}
    status_heating
  {% endif %}
    M109.1 { rawparams }
  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}






[gcode_macro _MOVE_AWAY]
gcode:
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
      
    G90                                      ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing


[gcode_macro PARK_CENTER_REAR]
gcode:
    {% if printer["gcode_macro status_busy"] != null %}
      status_busy
    {% endif %}
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}

    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600  
    {% if printer["gcode_macro status_ready"] != null %}
    status_ready
    {% endif %}

[exclude_object]

