#####################################################################
# Print Start / End
#####################################################################

[gcode_macro PRINT_START]
gcode:
  {% set S = printer["gcode_macro PRINTER_SETTINGS"] %}
  {% set BED = params.BED_TEMP|default(S.default_bed_temp)|int %}
  {% set EXTRUDER = params.EXTRUDER_TEMP|default(S.default_extruder_temp)|int %}
  {% set PREHEAT = params.PREHEAT_TEMP|default(S.preheat_temp)|int %}

  SET_FAN_SPEED FAN=Bedfans SPEED=0
  SET_FAN_SPEED FAN=Nevermore SPEED=0

  G90
  M83

  M140 S{BED}
  M104 S{PREHEAT}

  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={PREHEAT-20} MAXIMUM={PREHEAT+15}

  _CHOME
  _CQGL


  G0 X{S.bedcenter_x} Y{S.bedcenter_y}F{S.move_speed}
  G28 Z
  G0 Z{S.safe_z} F{S.z_speed}

  CLEAN_NOZZLE

  M190 S{BED}

  BED_MESH_CLEAR
  BED_MESH_CALIBRATE

  G0 Z{S.safe_z} F{S.z_speed}
  G0 X{S.purge_x} Y{S.purge_y} F{S.move_speed}

  M109 S{EXTRUDER}

  PURGE_TO_BUCKET
  ADAPTIVE_PURGE

  {% if printer["gcode_macro status_printing"] != null %}
    status_printing
  {% endif %}


[gcode_macro PRINT_END]
gcode:
  M400

  {% if printer.extruder.temperature > 170 %}
    M83
    G1 E-10 F1800
  {% endif %}

  _MOVE_AWAY
  PARK_CENTER_REAR

  TURN_OFF_HEATERS

  SET_FAN_SPEED FAN=Bedfans SPEED=0
  SET_FAN_SPEED FAN=Nevermore SPEED=0

  M107
  G90


[gcode_macro _CHOME]
gcode:
  {% if printer["gcode_macro status_homing"] != null %}
    status_homing
  {% endif %}

  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}

  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}


[gcode_macro _CQGL]
gcode:
  {% if printer.quad_gantry_level.applied == False %}
    {% if printer.toolhead.homed_axes != "xyz" %}
      G28
    {% endif %}

    {% if printer["gcode_macro status_leveling"] != null %}
      status_leveling
    {% endif %}

    QUAD_GANTRY_LEVEL
    G28 Z
  {% endif %}

  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}
