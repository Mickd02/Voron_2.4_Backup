[gcode_macro PRINT_START]
gcode:
  {% set BED = params.BED_TEMP|default(75)|int %}
  {% set EXTRUDER = params.EXTRUDER_TEMP|default(240)|int %}
  {% set PREHEAT = 170 %}

  SET_FAN_SPEED FAN=Bedfans SPEED=0
  SET_FAN_SPEED FAN=Nevermore SPEED=0

  G90
  M83

  M140 S{BED}
  M104 S{PREHEAT}

  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={PREHEAT-20} MAXIMUM={PREHEAT+15}

  _CHOME
  _CQGL

  G0 X175 Y175 F10000
  G28 Z
  G0 Z10 F3000

  CLEAN_NOZZLE

  M190 S{BED}

  BED_MESH_CLEAR
  BED_MESH_CALIBRATE

  G0 Z10 F3000
  G0 X150 Y2 F10000

  M109 S{EXTRUDER}

  PURGE_TO_BUCKET
  ADAPTIVE_PURGE

  {% if printer["gcode_macro status_printing"] != null %}
    status_printing
  {% endif %}


[gcode_macro PRINT_END]
gcode:
  M400

  {% if printer.extruder.temperature > 170 %}
    M83
    G1 E-10 F1800
  {% endif %}

  _MOVE_AWAY
  PARK_CENTER_REAR

  TURN_OFF_HEATERS

  SET_FAN_SPEED FAN=Bedfans SPEED=0
  SET_FAN_SPEED FAN=Nevermore SPEED=0

  M107
  G90


[gcode_macro _CHOME]
gcode:
  {% if printer["gcode_macro status_homing"] != null %}
    status_homing
  {% endif %}

  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}

  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}


[gcode_macro _CQGL]
gcode:
  {% if printer.quad_gantry_level.applied == False %}
    {% if printer.toolhead.homed_axes != "xyz" %}
      G28
    {% endif %}

    {% if printer["gcode_macro status_leveling"] != null %}
      status_leveling
    {% endif %}

    QUAD_GANTRY_LEVEL
    G28 Z
  {% endif %}

  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}


[gcode_macro M190]
rename_existing: M190.1
gcode:
  {% if printer["gcode_macro status_heating"] != null %}
    status_heating
  {% endif %}

  M190.1 {rawparams}

  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}


[gcode_macro M109]
rename_existing: M109.1
gcode:
  {% if printer["gcode_macro status_heating"] != null %}
    status_heating
  {% endif %}

  M109.1 {rawparams}

  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}


[gcode_macro ADAPTIVE_PURGE]
description: Adaptive purge near printed objects

variable_adaptive_enable: True
variable_z_height: 0.4
variable_tip_distance: 10
variable_purge_amount: 40
variable_flow_rate: 10
variable_x_default: 5
variable_y_default: 5
variable_size: 10
variable_distance_to_object_x: 15
variable_distance_to_object_y: 15

gcode:
  {% if adaptive_enable == True %}
    {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}
    {% set raw_x = (all_points | map(attribute=0) | min | default(x_default + distance_to_object_x + size)) - distance_to_object_x - size %}
    {% set raw_y = (all_points | map(attribute=1) | min | default(y_default + distance_to_object_y + size)) - distance_to_object_y - size %}
    {% set x_origin = [raw_x, x_default] | max %}
    {% set y_origin = [raw_y, y_default] | max %}
  {% else %}
    {% set x_origin = x_default | float %}
    {% set y_origin = y_default | float %}
  {% endif %}

  {% set purge_move_speed = 2.31 * size * flow_rate / (purge_amount * 2.405) %}
  {% set prepurge_speed = flow_rate / 2.405 %}

  { action_respond_info("Adaptive purge X:" ~ x_origin|string ~ " Y:" ~ y_origin|string) }

  SAVE_GCODE_STATE NAME=ADAPTIVE_PURGE_STATE

  G92 E0
  G90
  M83

  G0 F12000
  G0 X{x_origin} Y{y_origin + size / 2}
  G0 Z{z_height}

  G1 E{tip_distance} F{prepurge_speed * 60}

  G1 X{x_origin + size * 0.289} Y{y_origin + size} E{purge_amount / 4} F{purge_move_speed * 60}
  G1 E-0.5 F2100
  G0 Z{z_height * 2}

  G0 X{x_origin + size * 0.789} Y{y_origin + size}
  G0 Z{z_height}
  G1 E0.5 F2100
  G1 X{x_origin + size * 0.211} Y{y_origin} E{purge_amount / 2} F{purge_move_speed * 60}
  G1 E-0.5 F2100
  G0 Z{z_height * 2}

  G0 X{x_origin + size * 0.711} Y{y_origin}
  G0 Z{z_height}
  G1 E0.5 F2100
  G1 X{x_origin + size} Y{y_origin + size / 2} E{purge_amount / 4} F{purge_move_speed * 60}
  G1 E-0.5 F2100

  G92 E0
  RESTORE_GCODE_STATE NAME=ADAPTIVE_PURGE_STATE


[gcode_macro _MOVE_AWAY]
gcode:
  {% set th = printer.toolhead %}
  {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
  {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
  {% set z_safe = [th.position.z + 2, th.axis_maximum.z] | min %}

  G90
  G0 X{x_safe} Y{y_safe} Z{z_safe} F20000


[gcode_macro PARK_CENTER_REAR]
gcode:
  {% if printer["gcode_macro status_busy"] != null %}
    status_busy
  {% endif %}

  {% set th = printer.toolhead %}

  G90
  G0 X{th.axis_maximum.x / 2} Y{th.axis_maximum.y - 2} F6000

  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}


[exclude_object]