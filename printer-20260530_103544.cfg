######################################
[include gab-3d-utilities.cfg]
######################################
[include shell_command.cfg]
######################################
[include mainsail.cfg]
######################################
[include 1.filament_load.cfg]
######################################
[include 1.filament_runout.cfg]
######################################
[include 1.print_start.cfg]
######################################
[include 1.cabinet_lights.cfg]
######################################
[include 1.Cabinetfans.cfg]
######################################
[include 1.clean_nozzle.cfg]
######################################
[include 1.purge_to_bucket.cfg]
######################################
[include config_backup.cfg]
######################################
[exclude_object]
######################################
# Enable arcs support
[gcode_arcs]
resolution: 0.1
######################################
[mcu]
canbus_uuid=62b630751614
#########################################
[mcu EBB36]
canbus_uuid: 97f7fdc8d8ef
#########################################
[mcu cartographer]
canbus_uuid: 6af4751c7765
#########################################
#restart_method: command##--------------------------------------------------------------------
[printer]
kinematics: corexy
max_velocity: 400  
max_accel: 3000   			#Max 4000
max_z_velocity: 15 			#Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0
[temperature_sensor BTT_M8P MCU]
sensor_type: temperature_mcu
[temperature_sensor BTT_CB1 SoC]
sensor_type: temperature_host
[temperature_sensor BTT_EBB36 EBB36]
sensor_type: temperature_host
##########################
# 	X/Y Stepper Settings
##########################
## X Stepper on Motor1(B Motor)
[stepper_x]
step_pin: PE2
dir_pin: PB4
enable_pin: !PC11
rotation_distance: 40
full_steps_per_rotation:400
microsteps: 16
endstop_pin: EBB36:PA15
position_min: 0
position_endstop: 338
position_max: 338
homing_speed: 60   #Max 100
homing_retract_dist: 2
homing_positive_dir: true
[tmc2209 stepper_x]
uart_pin: PC10
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 1
######################################################################
## Y Stepper on Motor2 (A Motor)
[stepper_y]
step_pin: PF12
dir_pin: PF11
enable_pin: !PB3
microsteps: 16
rotation_distance: 40
full_steps_per_rotation:400
endstop_pin: ^PC13
position_min: 0
position_endstop: 358
position_max: 358
homing_speed: 60  #Max 100
homing_retract_dist: 2
homing_positive_dir: true
[tmc2209 stepper_y]
uart_pin: PF13
interpolate: True
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0
#################################
# 	Z Stepper Settings  Motor 3
#################################
## Z0 Stepper - Front Left on MOTOR3
[stepper_z]
step_pin: PD7
dir_pin: PD6
enable_pin: !PF10
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 340
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 0
[tmc2209 stepper_z]
uart_pin: mcu: PF9
interpolate: true
run_current: 0.8
hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0
######################################
#	Z1 Stepper - Rear Left on Motor4
######################################
[stepper_z1]
step_pin: PD3
dir_pin: !PD2
enable_pin: !PD5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
[tmc2209 stepper_z1]
uart_pin: PD4
interpolate: true
run_current: 0.8
hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0
########################################
#	Z2 Stepper - Rear Right on Motor5
########################################
[stepper_z2]
step_pin: PC9
dir_pin: PC8
enable_pin: !PD1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
[tmc2209 stepper_z2]
uart_pin: PD0
interpolate: true
run_current: 0.8
hold_current: 0.80
sense_resistor: 0.110
stealthchop_threshold: 0
#########################################
#	Z3 Stepper - Front Right on Motor7
#########################################
[stepper_z3]
step_pin: PD11
dir_pin: !PD9
enable_pin: !PD15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
[tmc2209 stepper_z3]
uart_pin: PD14
interpolate: true
run_current: 0.8
hold_current: 0.80
sense_resistor: 0.110
stealthchop_threshold: 0
########################
# 	Extruder Orbiter2
########################
[extruder]
step_pin: EBB36:PB14
dir_pin: EBB36:PA8
enable_pin: !EBB36:PB6
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.650
nozzle_diameter: 0.400 #define nozzle diameter
filament_diameter: 1.750
max_extrude_only_distance: 500
max_extrude_cross_section: 6.00
max_extrude_only_velocity: 120
pressure_advance: 0.050
pressure_advance_smooth_time: 0.12 #as advised by imput shaper##
heater_pin: EBB36:PB4
sensor_type: PT1000
sensor_pin: EBB36: PA3
pullup_resistor: 2190
min_temp: 0
max_temp: 350
min_extrude_temp: 210
#control: pid
#pid_Kp: 20.673
#pid_Ki: 1.838
#pid_Kd: 58.145
max_power: 0.75
[tmc2209 extruder]
uart_pin: EBB36:PB3
run_current: 0.650
stealthchop_threshold: 999999
interpolate: true
run_current: 0.85 
hold_current: 0.100
################################################################
########### Macro to run 2 Fan outputs PD3 and PA5##############
[gcode_macro M106]
rename_existing: M106.1
gcode:
    {% set s = params.S|default(255)|float %}
    {% set speed = s / 255 %}
    M106.1 S{s}
    SET_FAN_SPEED FAN=part_fan_2 SPEED={speed}

[gcode_macro M107]
rename_existing: M107.1
gcode:
    M107.1
    SET_FAN_SPEED FAN=part_fan_2 SPEED=0
#####################end macro ##################
#################################################
[fan]
pin: EBB36:PD3
max_power: 1.0
kick_start_time: 0.5
cycle_time: 0.010
###########FAN 2 #############
[fan_generic part_fan_2]
pin: EBB36:PA5
max_power: 1.0
kick_start_time: 0.5
cycle_time: 0.010

#####################
#   Heatbreak fan   #
#####################
[heater_fan hotend_fan]
pin: EBB36: PD2
heater: extruder
heater_temp: 50
#################
# 	Bed Heater  #
#################
[heater_bed]
##	SSR Pin - BED_OUT
##  Validate the following thermistor type to make sure it is correct
##  See https://www.klipper3d.org/Config_Reference.html#common-thermistors for additional options
heater_pin: PE3
sensor_type: NTC 100K MGB18-104F39050L32 
sensor_pin: PA0
max_power: 0.90
min_temp: 0
max_temp: 120
pwm_cycle_time: 0.02
#control: pid
#pid_kp: 50.754
#pid_ki: 1.057
#pid_kd: 609.46
############################
#  Buildplate Temperature  #
############################
[temperature_sensor buildplate]
sensor_type: Generic 3950
sensor_pin: PA1
min_temp: 0
max_temp: 120
######################################
#   Cabinet Temperature rear gantry  #
######################################
[temperature_sensor Chamber]
sensor_type: Generic 3950
sensor_pin: PA2
min_temp: 0
max_temp: 100
gcode_id: C
###########################################
# 	Fan Control lower electrical cabinet  #
###########################################
[heater_fan Case fans]
pin: PE6
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 5.0
heater: heater_bed
heater_temp: 50
fan_speed: 0.50
############################################
# 	Homing and Gantry Adjustment Routines  #
############################################
[safe_z_home]
home_xy_position:170,175
speed:200
z_hop:20
[quad_gantry_level]
gantry_corners:
	-60,-10
	410,420
#	Probe points
points:
	25,5
	25,300
	325,300
	325,5

speed: 300
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10
#--------------------------------------------------------------------

[cartographer]
mcu: cartographer
x_offset:  0 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: 22 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: no # For extra output
#############
[bed_mesh]
speed: 400
horizontal_move_z: 5
mesh_min: 25,25
mesh_max: 310,310
probe_count: 30,30
adaptive_margin: 10
algorithm: bicubic
fade_start: 0.6
fade_end: 10
zero_reference_position: 175,175
[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

[adxl345]
# Select 1 of the cs_pin below depending on the probe you have. 
# Having the wrong one selected will cause an Endless Bootloop
# Cartographer V4 has int2 connected to the probes PA1 pin
cs_pin: cartographer:PA3 # For Cartographer V3
cs_pin: cartographer:PA0 # For Cartographer V4
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
    170,170,20 # Fill out the blank with x and y coordinates where you want to run the resonance test

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE9, EXP1_2=PE10,
    EXP1_3=PE11, EXP1_4=PE12,
    EXP1_5=PE13, EXP1_6=PE14,    # Slot in the socket on this side
    EXP1_7=PE15, EXP1_8=PB10,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PB14, EXP2_2=PB13,
    EXP2_3=PF7, EXP2_4=PB12,
    EXP2_5=PE7, EXP2_6=PB11,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=PC5


[idle_timeout]
timeout: 1800

