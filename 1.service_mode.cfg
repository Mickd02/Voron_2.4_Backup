#####################################################################
# Service Mode
#####################################################################

[gcode_macro SERVICE_MODE]
description: Park printer at front service position and open filament menu
gcode:
    {% set S = printer["gcode_macro PRINTER_SETTINGS"] %}
    {% set TEMP = params.TEMP|default(S.preheat_temp)|int %}

    SET_DISPLAY_TEXT MSG="Service Mode"

    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    G90
    G1 Z{S.service_z} F{S.z_speed}
    G1 X{S.service_x} Y{S.service_y} F6000

    M104 S{TEMP}

    {% if printer["gcode_macro LED_ON"] != null %}
        LED_ON
    {% endif %}

    RESPOND TYPE=command MSG="action:prompt_begin Service Mode"
    RESPOND TYPE=command MSG="action:prompt_text Printer parked at service position."
    RESPOND TYPE=command MSG="action:prompt_button Load|LOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button Unload|UNLOAD_FILAMENT|secondary"
    RESPOND TYPE=command MSG="action:prompt_button Clean Nozzle|CLEAN_NOZZLE|secondary"
    RESPOND TYPE=command MSG="action:prompt_button Purge Bucket|PURGE_TO_BUCKET|secondary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Close|CLOSE_FILAMENT_MENU|warning"
    RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro SERVICE_PARK]
description: Park at front service position
gcode:
    {% set S = printer["gcode_macro PRINTER_SETTINGS"] %}

    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    G90
    G1 Z{S.service_z} F{S.z_speed}
    G1 X{S.service_x} Y{S.service_y} F6000
