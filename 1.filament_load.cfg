[gcode_macro FILAMENT_PROMPT]
gcode:
    {% set MSG = params.MSG|default("Filament action") %}
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=command MSG="action:prompt_begin Filament Wizard"
    RESPOND TYPE=command MSG="action:prompt_text {MSG}"
    RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro FILAMENT_PROMPT_END]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"


[gcode_macro LOAD_FILAMENT]
gcode:
    {% set HOTEND_load_TEMP = params.TEMP|default(240)|float %}

    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=command MSG="action:prompt_begin Load Filament"
    RESPOND TYPE=command MSG="action:prompt_text Insert filament into the extruder, then press Build Temp"
    RESPOND TYPE=command MSG="action:prompt_button Build Temp|LOAD_FILAMENT_HEAT TEMP={HOTEND_load_TEMP}|primary"
    RESPOND TYPE=command MSG="action:prompt_button Cancel|FILAMENT_PROMPT_END|secondary"
    RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro LOAD_FILAMENT_HEAT]
gcode:
    {% set HOTEND_load_TEMP = params.TEMP|default(240)|float %}

    RESPOND TYPE=command MSG="action:prompt_end"

    M83
    M104 S{HOTEND_load_TEMP}

    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={HOTEND_load_TEMP-10} MAXIMUM={HOTEND_load_TEMP+10}

    RESPOND TYPE=command MSG="action:prompt_begin Load Filament"
    RESPOND TYPE=command MSG="action:prompt_text Nozzle is at loading temperature. Press Start Load."
    RESPOND TYPE=command MSG="action:prompt_button Start Load|LOAD_FILAMENT_START TEMP={HOTEND_load_TEMP}|primary"
    RESPOND TYPE=command MSG="action:prompt_button Cancel|FILAMENT_PROMPT_END|secondary"
    RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro LOAD_FILAMENT_START]
gcode:
    {% set HOTEND_load_TEMP = params.TEMP|default(240)|float %}

    FILAMENT_PROMPT MSG="Loading filament into extruder gears"
    G1 E30.0 F300
    M400

    FILAMENT_PROMPT MSG="Loading filament into hotend"
    G4 P1000
    G1 E75.0 F300
    M400

    FILAMENT_PROMPT MSG="Purging filament"
    G4 P2000
    G1 E75.0 F600
    G1 E-5 F600

    M82
    G92 E0.0
    M400

    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=command MSG="action:prompt_begin Load Complete"
    RESPOND TYPE=command MSG="action:prompt_text Filament load complete"
    RESPOND TYPE=command MSG="action:prompt_button Purge More|PURGE_MORE|primary"
    RESPOND TYPE=command MSG="action:prompt_button Close|FILAMENT_PROMPT_END|secondary"
    RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% set HOTEND_unload_TEMP = params.TEMP|default(215)|float %}

    FILAMENT_PROMPT MSG="Heating or cooling nozzle to {HOTEND_unload_TEMP}C"

    M83
    M104 S{HOTEND_unload_TEMP}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={HOTEND_unload_TEMP-5} MAXIMUM={HOTEND_unload_TEMP+5}

    FILAMENT_PROMPT MSG="Forming clean filament tip"

    G1 E2 F240
    G1 E-10 F1800
    G4 P500
    G1 E-6 F1900

    FILAMENT_PROMPT MSG="Unloading filament"

    G1 E-110 F1900

    M82
    G92 E0
    M400

    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=command MSG="action:prompt_begin Unload Complete"
    RESPOND TYPE=command MSG="action:prompt_text Remove filament. Insert new filament if required."
    RESPOND TYPE=command MSG="action:prompt_button Load New Filament|LOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button Close|FILAMENT_PROMPT_END|secondary"
    RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro PURGE_MORE]
gcode:
    FILAMENT_PROMPT MSG="Purging more filament"

    M83
    G1 E40 F600
    G1 E-5 F600
    M82
    G92 E0
    M400

    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=command MSG="action:prompt_begin Extra Purge Complete"
    RESPOND TYPE=command MSG="action:prompt_text Extra purge complete"
    RESPOND TYPE=command MSG="action:prompt_button Purge More|PURGE_MORE|primary"
    RESPOND TYPE=command MSG="action:prompt_button Close|FILAMENT_PROMPT_END|secondary"
    RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro M600]
description: Filament change
gcode:
    {% set X = params.X|default(215)|float %}
    {% set Y = params.Y|default(2)|float %}
    {% set Z = params.Z|default(25)|float %}

    SAVE_GCODE_STATE NAME=M600_state

    FILAMENT_PROMPT MSG="Pausing print and moving to filament change position"

    PAUSE

    G91
    G1 Z{Z} F600
    G90
    G1 X{X} Y{Y} F3000
    M400

    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=command MSG="action:prompt_begin Filament Change"
    RESPOND TYPE=command MSG="action:prompt_text Ready to unload or load filament"
    RESPOND TYPE=command MSG="action:prompt_button Unload Filament|UNLOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button Load Filament|LOAD_FILAMENT|secondary"
    RESPOND TYPE=command MSG="action:prompt_button Close|FILAMENT_PROMPT_END|secondary"
    RESPOND TYPE=command MSG="action:prompt_show"

    RESTORE_GCODE_STATE NAME=M600_state