[filament_switch_sensor filament_sensor]
pause_on_runout: True

runout_gcode:
    {% set PRINT_TEMP = printer.extruder.target %}
    {% set FAN_SPEED = printer.fan.speed %}
    SET_GCODE_VARIABLE MACRO=FILAMENT_CHANGE VARIABLE=resume_temp VALUE={PRINT_TEMP}
    SET_GCODE_VARIABLE MACRO=FILAMENT_CHANGE VARIABLE=fan_speed VALUE={FAN_SPEED}

    M117 Moving to unload position
    G91
    G1 Z25 F600
    G90
    G1 X215 Y2 F3500
    M400

    {% set HOTEND_unload_TEMP = 215 %}
    M83

    M117 Cooling to unload temp
    M104 S{HOTEND_unload_TEMP}
    M106 S255
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={HOTEND_unload_TEMP-5} MAXIMUM={HOTEND_unload_TEMP+5}

    ; Restore original part cooling fan speed
    M106 S{(printer["gcode_macro FILAMENT_CHANGE"].fan_speed * 255)|int}

    M117 Ready to Unload filament

    ; --- soften nozzle ---
    G1 E2 F240

    ; --- form clean tip ---
    G1 E-10 F1800
    G4 P500
    G1 E-6 F1900

    M117 Unloading filament

    ; --- full unload ---
    G1 E-110 F1900

    M82
    G92 E0
    M400
    M117 Unload complete. Please rethread filament

insert_gcode:
    {% set RESUME_TEMP = printer["gcode_macro FILAMENT_CHANGE"].resume_temp %}

    M117 Heating back to print temp
    M104 S{RESUME_TEMP}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={RESUME_TEMP-5} MAXIMUM={RESUME_TEMP+5}

    M117 Filament detected 10 seconds to place in extruder
    G4 P10000
    M400

    M117 Loading filament into extruder gears
    M83
    G1 E25.0 F300
    M400

    M117 Filament loading into Hotend
    G4 P1000
    G1 E80.0 F300
    M400

    M117 Filament Purge
    G4 P2000
    G1 E150.0 F600
    G1 E-5 F600

    M82
    G92 E0.0
    M400

    ; Restore original part cooling fan speed again before resume
    M106 S{(printer["gcode_macro FILAMENT_CHANGE"].fan_speed * 255)|int}

    M117 Filament load complete Resume print when ready
    G4 P2000
    M400
    M117

event_delay: 3.0
switch_pin: !PF5


[gcode_macro FILAMENT_CHANGE]
variable_resume_temp: 0
variable_fan_speed: 0
gcode: