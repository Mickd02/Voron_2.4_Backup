
#####################################################################
# Filament Runout Handling
# Uses the shared filament_handling.cfg menus/macros.
#
# IMPORTANT:
# - Set the switch_pin below to suit your actual runout sensor.
# - If your logic is reversed, change switch_pin from ^PIN to !^PIN.
#####################################################################

# Example only - edit PIN to suit your printer/toolhead board.
# Common examples might be: ^PG12, ^EBB36:PB6, ^toolhead:PB6, etc.
[filament_switch_sensor filament_sensor]
pause_on_runout: False
switch_pin: !PF5
runout_gcode:
    FILAMENT_RUNOUT
insert_gcode:
    FILAMENT_INSERTED
event_delay: 3.0
pause_delay: 0.5


[gcode_macro FILAMENT_RUNOUT_STATE]
variable_active: False
variable_saved_temp: 0
variable_saved_fan: 0
variable_unload_temp: 215
variable_park_x: 215
variable_park_y: 2
variable_lift_z: 25
gcode:


[gcode_macro FILAMENT_RUNOUT]
description: Handles filament runout during a print

gcode:
    {% set S = printer["gcode_macro FILAMENT_RUNOUT_STATE"] %}
    {% set target = printer.extruder.target|float %}
    {% set fan_speed = printer.fan.speed|float %}
    {% set unload_temp = params.UNLOAD_TEMP|default(S.unload_temp)|float %}
    {% set park_x = params.X|default(S.park_x)|float %}
    {% set park_y = params.Y|default(S.park_y)|float %}
    {% set lift_z = params.Z|default(S.lift_z)|float %}

    SET_GCODE_VARIABLE MACRO=FILAMENT_RUNOUT_STATE VARIABLE=active VALUE=True
    SET_GCODE_VARIABLE MACRO=FILAMENT_RUNOUT_STATE VARIABLE=saved_temp VALUE={target}
    SET_GCODE_VARIABLE MACRO=FILAMENT_RUNOUT_STATE VARIABLE=saved_fan VALUE={fan_speed}

    FILAMENT_STATUS MSG="Filament runout detected"
    PAUSE

    G91
    G1 Z{lift_z} F600
    G90
    G1 X{park_x} Y{park_y} F6000
    M400

    ; Drop to unload temperature for cleaner tip/removal.
    ; If hotend is above unload temp, use part cooling fan to speed cooling.
    M104 S{unload_temp}
    {% if printer.extruder.temperature > unload_temp %}
        M106 S255
        FILAMENT_STATUS MSG="Cooling to {unload_temp}C for unload"
    {% else %}
        FILAMENT_STATUS MSG="Heating to {unload_temp}C for unload"
    {% endif %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={unload_temp-3} MAXIMUM={unload_temp+8}
    M106 S{(fan_speed * 255)|int}

    RESPOND TYPE=command MSG="action:prompt_begin Filament Runout"
    RESPOND TYPE=command MSG="action:prompt_text Filament has run out. Unload old filament, load new filament, then resume."
    RESPOND TYPE=command MSG="action:prompt_button Unload|UNLOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_button Load New|LOAD_FILAMENT|secondary"
    RESPOND TYPE=command MSG="action:prompt_button Resume Print|FILAMENT_RUNOUT_RESUME|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Close|CLOSE_FILAMENT_MENU|secondary"
    RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro FILAMENT_INSERTED]
description: Filament sensor insert event. Keeps runout menu alive during recovery.

gcode:
    {% set S = printer["gcode_macro FILAMENT_RUNOUT_STATE"] %}

    {% if S.active %}
        ; Do not close the prompt here. Re-threading filament through the sensor
        ; can trigger insert_gcode before the filament has actually been loaded.
        ; Re-show the recovery menu so KlipperScreen keeps the Load option visible.
        SET_DISPLAY_TEXT MSG="Filament detected - load/purge then resume"
        RESPOND TYPE=command MSG="action:prompt_begin Filament Runout"
        RESPOND TYPE=command MSG="action:prompt_text Filament has been detected by the sensor. Press Load New to feed it through the extruder, purge, then resume."
        RESPOND TYPE=command MSG="action:prompt_button Load New|LOAD_FILAMENT|primary"
        RESPOND TYPE=command MSG="action:prompt_button Purge More|PURGE_MORE|secondary"
        RESPOND TYPE=command MSG="action:prompt_button Resume Print|FILAMENT_RUNOUT_RESUME|primary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Close|CLOSE_FILAMENT_MENU|secondary"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        SET_DISPLAY_TEXT MSG="Filament detected"
    {% endif %}


[gcode_macro FILAMENT_RUNOUT_RESUME]
description: Restore print temperature and resume after runout

gcode:
    {% set S = printer["gcode_macro FILAMENT_RUNOUT_STATE"] %}
    {% set target = S.saved_temp|float %}
    {% set fan_speed = S.saved_fan|float %}

    CLOSE_FILAMENT_MENU

    {% if target > 0 %}
        FILAMENT_STATUS MSG="Restoring nozzle to {target}C"
        M104 S{target}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={target-3}
    {% endif %}

    M106 S{(fan_speed * 255)|int}
    SET_GCODE_VARIABLE MACRO=FILAMENT_RUNOUT_STATE VARIABLE=active VALUE=False
    SET_DISPLAY_TEXT MSG=""

    RESUME
